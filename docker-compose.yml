services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
    volumes:
      - ./agrodrone.db:/app/agrodrone.db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health ^|^| exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
