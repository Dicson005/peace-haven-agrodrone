apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrodrone-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agrodrone
  template:
    metadata:
      labels:
        app: agrodrone
    spec:
      containers:
        - name: agrodrone
          image: dicson005/peace-haven-agrodrone:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agrodrone-service
spec:
  selector:
    app: agrodrone
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agrodrone-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agrodrone-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
